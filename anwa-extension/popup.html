<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  body { width: 280px; font-family: 'DM Sans', sans-serif; background: #0a0a0a; color: #f0f0f0; margin: 0; padding: 16px; }
  .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .logo-dot { width: 12px; height: 12px; background: #1DB954; border-radius: 50%; }
  .title { font-size: 14px; font-weight: 600; }
  .status { background: #1a1a1a; border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 12px; }
  .status-label { color: #888; margin-bottom: 4px; }
  .status-value { color: #1DB954; font-family: monospace; word-break: break-all; }
  .status-time { color: #888; font-size: 11px; margin-top: 4px; }
  .btn { width: 100%; padding: 10px; background: #1DB954; color: #000; border: none; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn:hover { background: #22d464; }
  .info { font-size: 11px; color: #666; text-align: center; margin-top: 8px; line-height: 1.5; }
</style>
</head>
<body>
<div class="logo">
  <div class="logo-dot"></div>
  <div class="title">ANWA DJ Token</div>
</div>

<div class="status">
  <div class="status-label">Dernier token capturé</div>
  <div class="status-value" id="token-preview">En attente…</div>
  <div class="status-time" id="token-time"></div>
</div>

<button class="btn" id="open-btn">Ouvrir la console Spotify</button>
<div class="info">L'extension capte automatiquement le token dès que tu utilises la console Spotify</div>

<script>
chrome.storage.local.get(['lastToken', 'lastUpdate'], function(data) {
  if (data.lastToken) {
    document.getElementById('token-preview').textContent = data.lastToken;
    document.getElementById('token-time').textContent = 'Capturé à ' + data.lastUpdate;
  }
});

document.getElementById('open-btn').addEventListener('click', function() {
  chrome.tabs.create({ url: 'https://developer.spotify.com/console/post-playlists/' });
});
</script>
</body>
</html>
